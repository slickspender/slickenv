name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Build types
        run: cd types && bun run build

      - name: Typecheck CLI
        run: bun run typecheck

      - name: Run tests
        run: bun test src/lib/__tests__/

      - name: Build CLI
        run: bun run build
